    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="/assets/images/icon-192.png">
    <link rel="manifest" href="/manifest.json">

<body class="home-page theme-bvs">
<header class="site-header">
    <div class="container">
        <a class="logo" href="index.html" aria-label="BVS Radio">
            <img src="assets/images/Bvsradio_logo.png?v=2" alt="BVS Radio" class="logo-img" />
        </a>
        <nav class="nav" aria-label="Primary navigation">
            <a href="index.html" class="active">Home</a>
            <a href="radio.html">Radio</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
        </nav>
        <div class="header-actions">
            <div class="searchbar" role="search">
                <input id="siteSearch" type="search" placeholder="Search music, shows, products..." aria-label="Search BVS Radio" autocomplete="off" />
                <ul id="searchResults" class="search-results" role="listbox" aria-label="Search results" hidden></ul>
            </div>
            <button class="btn btn-secondary" id="loginBtn">Log in</button>
            <button class="btn" id="signUpBtn">Sign up</button>
        </div>
    </div>
</header>

<main class="container">
    <section class="card home-hero">
        <div class="home-hero__content">
            <div>
                <h1 class="home-hero__title">BVS Radio</h1>
                <p class="muted home-hero__subtitle">Daily updates, news and exclusive discounts</p>
            </div>
            <div class="home-hero__actions">
                <a class="btn" href="radio.html">▶︎ Listen Live</a>
                <a class="btn btn-secondary" href="shop.html">Shop deals</a>
            </div>
        </div>
    </section>

    <section class="card" id="dailyUpdates" aria-labelledby="updatesTitle">
        <h2 id="updatesTitle">Daily Updates</h2>
        <ul id="updatesList" class="list-grid"></ul>
    </section>

    <section class="card" id="latestNews" aria-labelledby="newsTitle">
        <h2 id="newsTitle">Latest News</h2>
        <div id="newsGrid" class="grid"></div>
    </section>

    <section class="card" id="deals" aria-labelledby="dealsTitle">
        <h2 id="dealsTitle">Deals & Discounts</h2>
        <div id="dealsGrid" class="grid"></div>
    </section>
</main>

<footer class="site-footer">
    <div class="container">
        <nav class="footer-nav">
            <a href="index.html">Home</a>
            <a href="radio.html">Radio</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
        </nav>
        <small>© <span id="year"></span> BVS Radio. All rights reserved.</small>
    </div>
</footer>

<script src="assets/js/main.js" defer></script>
<script src="assets/js/player.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('SW registered:', reg.scope);
    }).catch(err => {
      console.log('SW registration failed:', err);
    });
  });
}
</script>
</body>
</html>
